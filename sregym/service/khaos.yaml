---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: khaos-control-plane
  namespace: khaos
spec:
  selector:
    matchLabels:
      app: khaos
      profile: control-plane
  template:
    metadata:
      labels:
        app: khaos
        profile: control-plane
    spec:
      hostPID: true
      hostNetwork: true
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: khaos
          image: ghcr.io/sregym/khaos:latest
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          securityContext:
            privileged: true
          volumeMounts:
            - { name: sys-bpf,      mountPath: /sys/fs/bpf }
            - { name: sys-debug,    mountPath: /sys/kernel/debug }
            - { name: host-proc,    mountPath: /host/proc, readOnly: true }
            - { name: host-cgroup,  mountPath: /host/sys/fs/cgroup, readOnly: true }
            - { name: lib-modules,  mountPath: /lib/modules, readOnly: true }
            - { name: btf,          mountPath: /sys/kernel/btf, readOnly: true }
            - { name: run-dir,      mountPath: /run, readOnly: true }
            - { name: var-run,      mountPath: /var/run, readOnly: true }
            - { name: host-dev,     mountPath: /dev }
      volumes:
        - { name: sys-bpf,     hostPath: { path: /sys/fs/bpf, type: Directory } }
        - { name: sys-debug,   hostPath: { path: /sys/kernel/debug, type: Directory } }
        - { name: host-proc,   hostPath: { path: /proc, type: Directory } }
        - { name: host-cgroup, hostPath: { path: /sys/fs/cgroup, type: Directory } }
        - { name: lib-modules, hostPath: { path: /lib/modules, type: Directory } }
        - { name: btf,         hostPath: { path: /sys/kernel/btf, type: DirectoryOrCreate } }
        - { name: run-dir,     hostPath: { path: /run, type: Directory } }
        - { name: var-run,     hostPath: { path: /var/run, type: Directory } }
        - { name: host-dev,    hostPath: { path: /dev, type: Directory } }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: khaos-worker
  namespace: khaos
spec:
  selector:
    matchLabels:
      app: khaos
      profile: worker
  template:
    metadata:
      labels:
        app: khaos
        profile: worker
    spec:
      hostPID: true
      hostNetwork: true
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
      nodeSelector:
        node-role.kubernetes.io/worker: ""   # explicit worker targeting
      containers:
        - name: khaos
          image: ghcr.io/sregym/khaos:latest
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          securityContext:
            privileged: true
          volumeMounts:
            - { name: sys-bpf,      mountPath: /sys/fs/bpf }
            - { name: sys-debug,    mountPath: /sys/kernel/debug }
            - { name: host-proc,    mountPath: /host/proc, readOnly: true }
            - { name: host-cgroup,  mountPath: /host/sys/fs/cgroup, readOnly: true }
            - { name: lib-modules,  mountPath: /lib/modules, readOnly: true }
            - { name: btf,          mountPath: /sys/kernel/btf, readOnly: true }
            - { name: run-dir,      mountPath: /run, readOnly: true }
            - { name: var-run,      mountPath: /var/run, readOnly: true }
            - { name: openebs,      mountPath: /var/openebs }
            - { name: host-dev,     mountPath: /dev }
      volumes:
        - { name: sys-bpf,     hostPath: { path: /sys/fs/bpf, type: Directory } }
        - { name: sys-debug,   hostPath: { path: /sys/kernel/debug, type: Directory } }
        - { name: host-proc,   hostPath: { path: /proc, type: Directory } }
        - { name: host-cgroup, hostPath: { path: /sys/fs/cgroup, type: Directory } }
        - { name: lib-modules, hostPath: { path: /lib/modules, type: Directory } }
        - { name: btf,         hostPath: { path: /sys/kernel/btf, type: DirectoryOrCreate } }
        - { name: run-dir,     hostPath: { path: /run, type: Directory } }
        - { name: var-run,     hostPath: { path: /var/run, type: Directory } }
        - { name: openebs,     hostPath: { path: /var/openebs, type: Directory } }
        - { name: host-dev,    hostPath: { path: /dev, type: Directory } }
